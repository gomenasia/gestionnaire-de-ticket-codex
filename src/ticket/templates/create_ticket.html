{% extends "base.html" %}

{% block styles %}
  <link rel="stylesheet" href="{{ url_for('static', filename='css/ticket.css') }}">
{% endblock styles %}

{% block content %}
  <section class="card w_80">
    <h2>Créer un ticket</h2>
    <form method="post">
      <label for="title">Titre</label>
      <input id="title" name="title" type="text" required />

      <label for="categorie">Categorie</label>
      <select name="categorie" id="categorie">
        <option value="question" selected>
          <i class="fa-regular fa-circle-question"></i>Question</option>
        <option value="bug" >
          <i class="fa-solid fa-bug"></i>Bug</option>
        <option value="test" >
          <i class="fa-solid fa-flask"></i>Test</option>
        <option value="git">
          <i class="fa-brands fa-gitlab"></i>Git</option>
        <option value="other">
          <i class="fa-solid fa-asterisk"></i>Autre</option>
      </select>         <!-- INCOMPLETE -->

      <label for="content">Description</label>
      <textarea id="content" name="content" rows="6" required></textarea>

      <label for="deadline">Date de réponse attendue (optionnelle)</label>
      <input id="deadline" name="deadline" type="date" />

      <button type="submit">Soumettre</button>
    </form>
  </section>
{% endblock content %}
