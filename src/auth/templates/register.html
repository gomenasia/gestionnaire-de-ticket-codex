{% extends "base.html" %}

{% block title %}Inscription{% endblock title %}

{% block content %}
  <section class="card">
    <h2>Inscription</h2>
    <form method="post">
      <div class="input-wrapper">
        <i class="fa-solid fa-circle-user icon"></i>
        <input id="username" name="username" type="text" required />
      </div>

      <div class="input-wrapper">
        <i class="fa-solid fa-envelope icon"></i>
        <input id="email" name="email" type="email" required />
      </div>

      <div class="input-wrapper">
        <i class="fa-solid fa-lock icon"></i>
        <input id="password" name="password" type="password" required />
        <i class="fa-solid fa-eye icon show-password"></i>
      </div>

      <button type="submit">Créer le compte</button>
    </form>
    <div class="form-control-other">
      <a href="{{ url_for('auth.login') }}" id="login">Se connecter</a>
    </div>
  </section>
{% endblock content %}

{% block scripts %}
  <script src="{{ url_for('static', filename='js/checkout_login_register.js') }}"></script>
{% endblock scripts %}

{% block styles %}
  <link rel="stylesheet" href="{{ url_for('static', filename='css/Auth.css') }}" />
{% endblock styles %}
