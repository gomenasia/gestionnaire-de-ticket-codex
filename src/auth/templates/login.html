{% extends "base.html" %}

{% block title %}Connexion{% endblock title %}

{% block styles %}
  <link rel="stylesheet" href="{{ url_for('static', filename='css/Auth.css') }}" />
{% endblock styles %}

{% block content %}
  <section class="card auth_card">
    <h1>Connexion</h1>
    <form method="post">
      <div>
        <div class="input-wrapper">
          <i class="fa-solid fa-envelope "></i>
          <input id="email" name="email" type="email" placeholder="Email" required />
        </div>
  
        <div class="input-wrapper">
          <i class="fa-solid fa-lock "></i>
          <input id="password" name="password" type="password" placeholder="Password" required />
          <i class="fa-solid fa-eye" onclick="changePasswordHideVisible('password', this)""></i>
        </div>
      </div>

      <button type="submit">Se connecter</button>
    </form>
    <div class="form-control-other">
      <a href="{{ url_for('auth.register') }}" id="create">Créer un compte</a>
    </div>
  </section>
{% endblock content %}

{% block scripts %}
  <script src="{{ url_for('static', filename='js/checkout_login_register.js') }}"></script>
{% endblock scripts %}
