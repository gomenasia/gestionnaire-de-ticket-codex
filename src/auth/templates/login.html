{% extends "base.html" %}

{% block title %}Connexion{% endblock title %}

{% block styles %}
  <link rel="stylesheet" href="{{ url_for('static', filename='css/Auth.css') }}" />
{% endblock styles %}

{% block content %}
  <section class="card">
    <h2>Connexion</h2>
    <form method="post">
      <div class="input-wrapper">
        <i class="fa-solid fa-envelope icon"></i>
        <input id="email" name="email" type="email" required />
      </div>

      <div class="input-wrapper">
        <i class="fa-solid fa-lock icon"></i>
        <input id="password" name="password" type="password" required />
        <i class="fa-solid fa-eye icon show-password"></i>
      </div>

      <button type="submit">Se connecter</button>
    </form>
    <div class="form-control-other">
      <a href="{{ url_for('auth.register') }}" id="create">Créer un compte</a>
    </div>
  </section>
{% endblock content %}

{% block scripts %}
  <script src="{{ url_for('static', filename='js/checkout_login_register.js') }}"></script>
{% endblock scripts %}
